<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EdMeCa Digital Academy - From Framework to Execution to Evidence. MBA-level business frameworks for entrepreneurs through hands-on delivery and AI-enabled tooling." />
    <meta name="keywords" content="business frameworks, entrepreneurship, startup, MVP, pitch deck, business model canvas, consulting, digital academy" />
    <meta property="og:title" content="EdMeCa Digital Academy - From Framework to Execution to Evidence" />
    <meta property="og:description" content="Turn frameworks into action, prototypes into products, ideas into investor-ready pitches." />
    <meta property="og:type" content="website" />
    
    <!-- Favicon - Multiple formats for browser compatibility -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    <meta name="theme-color" content="#1a365d" />
    
    <title>EdMeCa Digital Academy - From Framework to Execution to Evidence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=optional" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=optional"></noscript>
  </head>
  <body>
    <!-- Hidden form for Netlify Forms detection -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <select name="audienceType">
        <option value="entrepreneur">An Entrepreneur</option>
        <option value="programme">A Programme / Incubator</option>
        <option value="other">Other</option>
      </select>
      <textarea name="message"></textarea>
    </form>

    <!-- Hidden form for Netlify Forms — Access Applications -->
    <form name="signup" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="organisation" />
      <select name="interestType">
        <option value="entrepreneur">An Entrepreneur</option>
        <option value="programme">A Programme / Incubator</option>
        <option value="other">Other</option>
      </select>
      <textarea name="motivation"></textarea>
    </form>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
